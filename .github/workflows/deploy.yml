name: Deploy to Cloudflare Pages

# 触发条件：push到main分支时自动部署
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build
        env:
          # 从GitHub Secrets获取Gemini API密钥
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          # Cloudflare API 令牌，需要 Pages 编辑权限
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Cloudflare 账户 ID
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Cloudflare Pages 项目名称，请修改为你自己的项目名
          projectName: youtube-subtitles
          # 构建产物目录
          directory: dist
          # 部署分支
          branch: main
