name: Deploy to Cloudflare Pages

# 触发条件：push到main分支时自动部署
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build
        # 移除了无效的 GEMINI_API_KEY 环境变量配置

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: youtube-subtitles # 确保这与你在 Cloudflare 创建的项目名一致
          directory: .output/public      # ✅ 修复：Nuxt Cloudflare 预设的正确输出目录
          branch: main
